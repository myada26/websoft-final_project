services:
  - type: web
    name: fcats
    env: docker
    dockerfilePath: Dockerfile
    region:Singapore
    buildCommand: echo "Build handled in Dockerfile"
    startCommand: php-fpm
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false